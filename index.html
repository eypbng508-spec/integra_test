        ];

        function App() {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [isAnswered, setIsAnswered] = useState(false);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);

            const currentQuestion = questions[currentIdx];

            const handleOptionClick = (idx) => {
                if (isAnswered) return;
                setSelectedOpt(idx);
            };

            const handleSubmit = () => {
                if (selectedOpt === null || isAnswered) return;
                if (selectedOpt === currentQuestion.answer) setScore(score + 1);
                setIsAnswered(true);
            };

            const handleNext = () => {
                if (currentIdx + 1 < questions.length) {
                    setCurrentIdx(currentIdx + 1);
                    setSelectedOpt(null);
                    setIsAnswered(false);
                } else {
                    setShowResult(true);
                }
            };

            const resetQuiz = () => {
                setCurrentIdx(0);
                setSelectedOpt(null);
                setIsAnswered(false);
                setScore(0);
                setShowResult(false);
            };

            const getLetter = (idx) => ["A", "B", "C", "D", "E"][idx];

            if (showResult) {
                return (
                    <div className="bg-slate-800 rounded-2xl border border-slate-700 p-8 text-center shadow-xl">
                        <div className="text-6xl mb-4">🏆</div>
                        <h2 className="text-3xl font-extrabold mb-2">Test Bitti!</h2>
                        <p className="text-slate-400 mb-6">Büyük İntegral Maratonu Performans Sonucu</p>
                        <div className="bg-slate-900 rounded-xl p-6 mb-8 border border-slate-700 inline-block px-12">
                            <span className="text-5xl font-black text-emerald-400">{score}</span>
                            <span className="text-2xl text-slate-500 font-medium"> / {questions.length}</span>
                        </div>
                        <br />
                        <button onClick={resetQuiz} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-8 py-3 rounded-xl transition duration-150 cursor-pointer">
                            Yeniden Başla
                        </button>
                    </div>
                );
            }

            return (
                <div className="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
                    {/* İlerleme Çubuğu */}
                    <div className="w-full bg-slate-700 h-2">
                        <div className="bg-indigo-500 h-2 transition-all duration-300" style={{ width: `${((currentIdx + 1) / questions.length) * 100}%` }}></div>
                    </div>

                    <div className="p-6 sm:p-8">
                        {/* Üst Bilgi Başlığı */}
                        <div className="flex justify-between items-center mb-6">
                            <span className="text-xs font-bold uppercase bg-indigo-950 text-indigo-400 px-3 py-1 rounded-full border border-indigo-800">
                                Soru {currentIdx + 1} / {questions.length}
                            </span>
                            <span className="text-sm text-slate-400">Skor: <span className="text-emerald-400 font-bold">{score}</span></span>
                        </div>

                        {/* Soru Metni Alanı */}
                        <div className="bg-slate-900 rounded-xl p-6 mb-6 border border-slate-750 text-center text-xl font-medium shadow-inner overflow-hidden">
                            {currentQuestion.q.includes('\\int') ? (
                                <MathText math={currentQuestion.q} block={true} />
                            ) : (
                                <div className="flex flex-col items-center gap-2">
                                    <span className="text-slate-400 text-sm">Belirsiz integralini hesaplayınız:</span>
                                    <MathText math={`\\int ${currentQuestion.q}`} block={true} />
                                </div>
                            )}
                        </div>

                        {/* Şıklar / Seçenekler Alanı */}
                        <div className="space-y-3 mb-6">
                            {currentQuestion.options.map((opt, idx) => {
                                let btnStyle = "border-slate-700 bg-slate-850 hover:bg-slate-750 text-slate-200 cursor-pointer";
                                if (selectedOpt === idx && !isAnswered) btnStyle = "border-indigo-500 bg-indigo-950/40 text-indigo-200";
                                if (isAnswered) {
                                    if (idx === currentQuestion.answer) btnStyle = "border-emerald-500 bg-emerald-950/30 text-emerald-300 pointer-events-none";
                                    else if (selectedOpt === idx) btnStyle = "border-rose-500 bg-rose-950/30 text-rose-300 pointer-events-none";
                                    else btnStyle = "border-slate-800 bg-slate-850 text-slate-500 opacity-40 pointer-events-none";
                                }

                                return (
                                    <button key={idx} onClick={() => handleOptionClick(idx)} className={`w-full flex items-center border-2 rounded-xl p-4 transition-all duration-150 text-left font-medium overflow-hidden ${btnStyle}`}>
                                        <span className={`w-7 h-7 flex items-center justify-center rounded-lg text-sm font-bold mr-4 shrink-0 ${selectedOpt === idx ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400'}`}>
                                            {getLetter(idx)}
                                        </span>
                                        {/* no-scrollbar ve overflow-hidden sayesinde tarayıcı dikey/yatay çizgileri tamamen bloke edildi */}
                                        <div className="text-base tracking-wide overflow-hidden no-scrollbar w-full">
                                            <MathText math={opt} />
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        {/* Alt Butonlar */}
                        <div className="flex justify-end">
                            {!isAnswered ? (
                                <button onClick={handleSubmit} disabled={selectedOpt === null} className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-bold px-8 py-3 rounded-xl transition duration-150 shadow-lg cursor-pointer">
                                    Cevabı Onayla
                                </button>
                            ) : (
                                <button onClick={handleNext} className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-8 py-3 rounded-xl transition duration-150 shadow-lg cursor-pointer">
                                    {currentIdx + 1 === questions.length ? "Sonuçları Gör" : "Sıradaki Soru →"}
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
